ai_usage_summary: |
  Used Gemini (Antigravity IDE agent) for architecture discussion, code review,
  and implementation assistance. No candidate data was fed to any external LLM API.
  All ranking happens offline with local models (BGE, cross-encoder).

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-stage hybrid pipeline: (1) Offline pre-computation embeds 100K candidate
  career descriptions using BAAI/bge-small-en-v1.5 into a FAISS IndexFlatIP.
  Five scoring components (semantic similarity 40%, career arc 25%, skill trust
  15%, location 10%, YoE 10%) multiplied by a behavioral score produce a
  composite fit score. (2) At rank time, FAISS retrieves top 3000, multi-signal
  scoring selects top 200, and cross-encoder/ms-marco-MiniLM-L-6-v2 re-ranks
  them. Final top 100 output with template-based reasoning from verified JSON
  fields. Key design: embed career_history descriptions (not skills list) to
  defeat keyword-stuffer traps; deterministic honeypot detection via date math;
  behavioral multiplier separates active from ghost candidates.

